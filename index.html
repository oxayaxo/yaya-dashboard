<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自分状態ダッシュボード ✦</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #08081a;
  --surface: #0f0f28;
  --card: #13132e;
  --border: #252550;
  --accent: #60a5fa;
  --accent2: #c084fc;
  --accent3: #34d399;
  --text: #e2e8f0;
  --muted: #64748b;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  min-height: 100vh;
  padding: 28px 16px 60px;
}
.container { max-width: 760px; margin: 0 auto; }

/* Header */
.header { text-align: center; margin-bottom: 28px; }
.header-stars { font-size: 1rem; color: var(--accent); letter-spacing: 8px; margin-bottom: 8px; }
.header h1 { font-size: 1.35rem; font-weight: 700; color: #fff; letter-spacing: 0.15em; }
.header-date { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

/* Date picker */
.date-row {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 24px;
}
.date-row label { font-size: 0.8rem; color: var(--muted); }
input[type="date"] {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 7px 14px; border-radius: 10px;
  font-size: 0.95rem; cursor: pointer; outline: none;
}
input[type="date"]:focus { border-color: var(--accent); }

/* Overall */
.overall {
  background: linear-gradient(135deg, #13132e 0%, #1a1040 100%);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 28px; text-align: center;
  margin-bottom: 20px; position: relative; overflow: hidden;
}
.overall::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 60% 40%, rgba(96,165,250,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.overall-emoji { font-size: 3.5rem; margin-bottom: 4px; }
.overall-score { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.overall-label { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
.overall-desc { font-size: 0.95rem; color: var(--text); margin-top: 10px; }

/* Section title */
.section-title {
  font-size: 0.75rem; color: var(--accent); letter-spacing: 0.12em;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Chart */
.chart-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px; margin-bottom: 20px;
}
canvas { display: block; width: 100%; }
.chart-legend { display: flex; gap: 20px; margin-top: 10px; font-size: 0.78rem; }
.leg { display: flex; align-items: center; gap: 6px; color: var(--muted); }
.leg-line { width: 20px; height: 3px; border-radius: 2px; }

/* Bio bars */
.bio-bars { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
.bio-row { display: flex; align-items: center; gap: 10px; }
.bio-label { font-size: 0.78rem; color: var(--muted); width: 28px; flex-shrink: 0; }
.bio-track {
  flex: 1; height: 8px; background: var(--border);
  border-radius: 4px; position: relative;
}
.bio-center { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #2a2a5a; transform: translateX(-50%); }
.bio-fill { position: absolute; top: 0; height: 100%; border-radius: 4px; transition: all 0.6s cubic-bezier(.4,0,.2,1); }
.bio-pct { font-size: 0.78rem; width: 42px; text-align: right; flex-shrink: 0; }
.bio-badge {
  font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; flex-shrink: 0; width: 62px; text-align: center;
}
.badge-up   { background: rgba(52,211,153,.15); color: #34d399; border: 1px solid rgba(52,211,153,.3); }
.badge-down { background: rgba(239,68,68,.15);  color: #ef4444;  border: 1px solid rgba(239,68,68,.3); }
.badge-crit { background: rgba(251,191,36,.18); color: #fbbf24;  border: 1px solid rgba(251,191,36,.4); }

/* Cards */
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
@media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px;
}
.card-icon { font-size: 1.4rem; margin-bottom: 6px; }
.card-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 4px; }
.card-value { font-size: 1.45rem; font-weight: 700; }
.card-sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }

/* Tips */
.tips-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px;
}
.tip {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.tip:first-child { padding-top: 0; }
.tip:last-child  { border-bottom: none; padding-bottom: 0; }
.tip-icon { font-size: 1.2rem; flex-shrink: 0; padding-top: 2px; }
.tip-body { flex: 1; }
.tip-text { font-size: 0.88rem; line-height: 1.7; }
.tip-src  { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }

/* Birth input */
.birth-row { text-align: center; margin-top: 24px; }
.birth-row .birth-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }

/* Period phase card */
.period-card-inner { display: flex; flex-direction: column; gap: 4px; }
.phase-bar { height: 6px; border-radius: 3px; margin-top: 10px; background: var(--border); position: relative; overflow: hidden; }
.phase-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.period-marker { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-top: 6px; font-weight: 700; }

/* Week day period dot */
.wd-period-dot { width: 6px; height: 6px; border-radius: 50%; background: #f87171; margin: 2px auto 0; }

/* Settings / period log */
.settings-wrap {
  margin-top: 24px;
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  overflow: hidden;
}
.settings-top {
  display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
  gap: 16px; padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.s-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.s-label { font-size: 0.68rem; color: var(--muted); }
.settings-top input[type="date"] { padding: 6px 10px; font-size: 0.85rem; }

/* Period log */
.period-log { padding: 16px 20px; }
.period-log-title {
  font-size: 0.72rem; color: var(--accent); letter-spacing: 0.1em;
  margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
}
.period-add-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.period-add-row input[type="date"] { flex: 1; padding: 6px 10px; font-size: 0.85rem; }
.btn {
  background: var(--accent); color: #fff; border: none;
  padding: 7px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;
  white-space: nowrap; font-weight: 600; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-sm { padding: 4px 10px; font-size: 0.72rem; border-radius: 6px; }
.btn-today { background: var(--accent3); }
.btn-del { background: transparent; color: #f87171; border: 1px solid #f8717144; font-size: 0.7rem; padding: 3px 8px; }
.period-history { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
.period-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: 8px; padding: 8px 12px;
  font-size: 0.82rem;
}
.period-row-date { font-weight: 600; flex: 1; }
.period-row-cycle { color: var(--muted); font-size: 0.75rem; flex: 1; }
.cycle-short { color: #fbbf24; }
.cycle-long  { color: #60a5fa; }
.period-moon { font-size: 0.72rem; flex-shrink: 0; }
.moon-new  { color: #60a5fa; font-weight: 700; }
.moon-full { color: #fbbf24; font-weight: 700; }
.period-avg {
  text-align: center; padding: 10px;
  font-size: 0.78rem; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 10px;
}
.period-avg strong { color: var(--text); }

/* Week view */
.week-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px; margin-bottom: 20px;
}
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 12px; }
.week-day {
  display: flex; flex-direction: column; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 4px; cursor: pointer;
  transition: border-color 0.2s;
}
.week-day:hover { border-color: var(--accent); }
.week-day.today { border-color: var(--accent); background: rgba(96,165,250,0.08); }
.week-day.selected { border-color: var(--accent2); background: rgba(192,132,252,0.1); }
.wd-dow  { font-size: 0.68rem; color: var(--muted); }
.wd-date { font-size: 0.75rem; font-weight: 700; margin: 2px 0; }
.wd-emoji { font-size: 1.1rem; margin: 2px 0; }
.wd-score { font-size: 0.72rem; font-weight: 700; }
.wd-bars { width: 100%; margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
.wd-bar-row { display: flex; align-items: center; gap: 2px; }
.wd-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; position: relative; }
.wd-bar-fill  { position: absolute; top: 0; height: 100%; border-radius: 2px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-stars">✦ ✦ ✦</div>
    <h1>自分状態ダッシュボード</h1>
    <div class="header-date" id="headerDate"></div>
  </div>

  <div class="date-row">
    <label>チェックする日</label>
    <input type="date" id="targetDate">
  </div>

  <!-- Overall -->
  <div class="overall">
    <div class="overall-emoji" id="overallEmoji"></div>
    <div class="overall-score" id="overallScore"></div>
    <div class="overall-label">総合エネルギースコア</div>
    <div class="overall-desc" id="overallDesc"></div>
  </div>

  <!-- Biorhythm -->
  <div class="chart-wrap">
    <div class="section-title">📈 バイオリズム（前後14日）</div>
    <canvas id="bioCanvas" height="150"></canvas>
    <div class="chart-legend">
      <div class="leg"><div class="leg-line" style="background:#f87171"></div>身体 (23日)</div>
      <div class="leg"><div class="leg-line" style="background:#c084fc"></div>感情 (28日)</div>
      <div class="leg"><div class="leg-line" style="background:#60a5fa"></div>知性 (33日)</div>
    </div>
    <div class="bio-bars" id="bioBars"></div>
  </div>

  <!-- Cards -->
  <div class="section-title" style="margin-bottom:14px">✦ 各軸の詳細</div>
  <div class="cards" id="cards"></div>

  <!-- Tips -->
  <div class="section-title" style="margin-bottom:14px">💫 今日のチップス</div>
  <div class="tips-wrap">
    <div id="tips"></div>
  </div>

  <!-- Week view -->
  <div class="section-title" style="margin-bottom:14px">📅 直近7日間の推移</div>
  <div class="week-wrap">
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- Settings + Period log -->
  <div class="settings-wrap">
    <div class="settings-top">
      <div class="s-item">
        <span class="s-label">生年月日</span>
        <input type="date" id="birthDate">
      </div>
    </div>
    <div class="period-log">
      <div class="period-log-title">
        <span>🔴 生理記録</span>
        <span id="periodAvgBadge" style="color:var(--text)"></span>
      </div>
      <div class="period-add-row">
        <input type="date" id="periodAddDate">
        <button class="btn btn-today" onclick="addTodayPeriod()">今日を追加</button>
        <button class="btn btn-sm" onclick="addPeriodDate()">追加</button>
      </div>
      <div class="period-history" id="periodHistory"></div>
      <div class="period-avg" id="periodAvgRow"></div>
    </div>
  </div>

</div>
<script>
// ── Biorhythm ──────────────────────────────────────────
function bioRhythm(birth, target) {
  const ms = 864e5;
  const d = Math.floor((target - birth) / ms);
  return {
    physical:     Math.sin(2 * Math.PI * d / 23),
    emotional:    Math.sin(2 * Math.PI * d / 28),
    intellectual: Math.sin(2 * Math.PI * d / 33),
    days: d
  };
}

// ── Numerology ──────────────────────────────────────────
function reduce(n) {
  while (n > 9 && n !== 11 && n !== 22 && n !== 33)
    n = String(n).split('').reduce((a,b) => a + +b, 0);
  return n;
}
function personalDay(birth, target) {
  const b = new Date(birth), t = new Date(target);
  const bm = b.getMonth()+1, bd = b.getDate();
  const ty = t.getFullYear(), tm = t.getMonth()+1, td = t.getDate();
  const py = reduce([...String(bm+bd+ty)].reduce((a,b)=>a+ +b,0));
  const pm = reduce(py + tm);
  const pd = reduce(pm + td);
  return { year: py, month: pm, day: pd };
}
const numInfo = {
  1:  { name:'独立・新始動',   icon:'⚡', tip:'自分の意志で動く日。新しい一歩を踏み出すのに最高のエネルギー。' },
  2:  { name:'協調・受容',     icon:'🤝', tip:'人との繋がりを大切に。直感と感受性が冴えわたる日。' },
  3:  { name:'表現・創造',     icon:'✨', tip:'発信・創作に最適。感じてることを言葉や行動で外に出して。' },
  4:  { name:'基盤・整理',     icon:'🏗️', tip:'コツコツ積み上げる日。環境整備・計画立案に向いてる。' },
  5:  { name:'変化・自由',     icon:'🌊', tip:'変化を楽しむ日。予定が変わっても大丈夫。流れに乗って。' },
  6:  { name:'愛・奉仕',       icon:'💛', tip:'大切な人と過ごす日。美しいものに触れて心を満たして。' },
  7:  { name:'内省・探究',     icon:'🔍', tip:'一人の時間を大切に。深く考えることに集中するのが吉。' },
  8:  { name:'豊かさ・力',     icon:'💎', tip:'ビジネス・お金の判断に向いてる日。行動が成果に直結しやすい。' },
  9:  { name:'完結・解放',     icon:'🌅', tip:'手放しと感謝の日。人のために動くと循環が生まれる。' },
  11: { name:'マスター・直感', icon:'🌟', tip:'特別な直感の日。スピリチュアルな感受性が最大化している。' },
  22: { name:'マスター・実現', icon:'🏛️', tip:'大きなビジョンを現実に落とす日。夢を動かすエネルギーがある。' },
  33: { name:'マスター・愛',   icon:'💫', tip:'愛と奉仕の最高エネルギー。人を癒し導く力が最大に。' },
};

// ── Moon phase ─────────────────────────────────────────
function moonPhase(target) {
  const knownNew = new Date('2000-01-06T18:14:00Z').getTime();
  const period = 29.53058867 * 864e5;
  const raw = ((target.getTime() - knownNew) % period + period) % period;
  const phase = raw / period;
  const age = phase * 29.53;

  let name, icon, energy;
  if      (phase < 0.03 || phase > 0.97) { name='新月';           icon='🌑'; energy='リセット・新しい意図を設定する時'; }
  else if (phase < 0.22)                  { name='三日月';         icon='🌒'; energy='種まき・計画を育てる時期'; }
  else if (phase < 0.28)                  { name='上弦の月';       icon='🌓'; energy='行動・決断・前進するエネルギー'; }
  else if (phase < 0.47)                  { name='十三夜';         icon='🌔'; energy='拡大・積み上げ・勢いに乗る時'; }
  else if (phase < 0.53)                  { name='満月';           icon='🌕'; energy='解放・感情が高まる・収穫の時'; }
  else if (phase < 0.72)                  { name='十六夜';         icon='🌖'; energy='感謝・手放し・整理のタイミング'; }
  else if (phase < 0.78)                  { name='下弦の月';       icon='🌗'; energy='振り返り・学び・内省の時期'; }
  else                                    { name='二十六夜（暗月）';icon='🌘'; energy='休息・内側へ・充電する時'; }
  return { phase, age, name, icon, energy };
}

// ── Day pillar (四柱推命 日柱) ────────────────────────
function dayPillar(date) {
  const stems   = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const branches= ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const sElem   = ['木','木','火','火','土','土','金','金','水','水'];
  const bElem   = ['水','土','木','木','土','火','火','土','金','金','土','水'];
  const sPolar  = ['+','-','+','-','+','-','+','-','+','-'];
  // Reference: 1900-01-01 = 甲戌 → ganzhi index 10
  const ref = new Date(1900, 0, 1, 12);
  const days = Math.floor((date.getTime() - ref.getTime()) / 864e5);
  const i60 = ((days + 10) % 60 + 60) % 60;
  const si = i60 % 10, bi = i60 % 12;
  const stemTips = {
    '甲':'新しい成長・リーダーシップが宿る日',
    '乙':'柔軟に・繊細な感性で受け取る日',
    '丙':'情熱と明るさを発揮する日',
    '丁':'内なる炎・直感を信じる日',
    '戊':'安定と信頼を積み重ねる日',
    '己':'地に足をつけ・実を取る日',
    '庚':'変容と決断・手放しの日',
    '辛':'洗練と内省・磨かれる日',
    '壬':'流れに乗り・知恵を活かす日',
    '癸':'完結と浄化・次へ向かう日',
  };
  return {
    pillar: stems[si]+branches[bi],
    stem: stems[si], branch: branches[bi],
    sElem: sElem[si], bElem: bElem[bi],
    polar: sPolar[si],
    tip: stemTips[stems[si]]
  };
}

// ── Overall score ──────────────────────────────────────
function overallScore(bio, num, moon) {
  let s = 50;
  s += bio.physical     * 15;
  s += bio.emotional    * 20;
  s += bio.intellectual * 10;
  if (moon.phase < 0.03 || moon.phase > 0.97) s += 6;
  if (moon.phase > 0.45 && moon.phase < 0.55) s -= 4;
  if ([11,22,33].includes(num.day)) s += 10;
  else if ([1,3,8].includes(num.day)) s += 5;
  s = Math.round(Math.min(96, Math.max(8, s)));
  let emoji, desc;
  if (s >= 75) { emoji='🌟'; desc='エネルギー全開！積極的に動いていい日'; }
  else if (s >= 55) { emoji='😊'; desc='安定している。じっくり丁寧に進める日'; }
  else if (s >= 35) { emoji='🌱'; desc='充電期。自分を整えることを最優先に'; }
  else              { emoji='🌙'; desc='深い内省の時。休むことが最大の戦略'; }
  return { score: s, emoji, desc };
}

// ── Tips ──────────────────────────────────────────────
function buildTips(bio, num, moon, pillar) {
  const tips = [];
  const isCrit = v => Math.abs(v) < 0.15;
  const p = Math.round(bio.physical*100);
  const e = Math.round(bio.emotional*100);
  const i = Math.round(bio.intellectual*100);

  if (isCrit(bio.physical))
    tips.push({icon:'⚠️', text:'身体バイオリズムが転換点。いつもより体を丁寧に扱う日。無理は禁物。', src:'バイオリズム（身体）'});
  else if (bio.physical < -0.5)
    tips.push({icon:'🛌', text:`身体エネルギーが低調期（${p}%）。休息を優先して。無理に動かなくていい。`, src:'バイオリズム（身体）'});
  else if (bio.physical > 0.65)
    tips.push({icon:'💪', text:`身体エネルギーが高峰（+${p}%）！運動・外出・体を動かすことが向いてる日。`, src:'バイオリズム（身体）'});

  if (isCrit(bio.emotional))
    tips.push({icon:'💙', text:'感情バイオリズムが転換点。大きな決断・感情的な判断は後日に。深呼吸を。', src:'バイオリズム（感情）'});
  else if (bio.emotional < -0.45)
    tips.push({icon:'🌧️', text:`感情エネルギーが内向き（${e}%）。落ち込んで当然の時期。自分を責めないで。気持ちを日記に書き出して。`, src:'バイオリズム（感情）'});
  else if (bio.emotional > 0.65)
    tips.push({icon:'🌈', text:`感情エネルギーが高まってる（+${e}%）！発信・人と会う・表現する。今の言葉には熱量がある。`, src:'バイオリズム（感情）'});

  if (isCrit(bio.intellectual))
    tips.push({icon:'🧠', text:'知性バイオリズムが転換点。重要な書類・契約の確認を念入りに。', src:'バイオリズム（知性）'});
  else if (bio.intellectual > 0.55)
    tips.push({icon:'✍️', text:`知性エネルギーが高い（+${i}%）！学習・執筆・分析・プレゼンに最適な日。`, src:'バイオリズム（知性）'});

  const nm = numInfo[num.day];
  if (nm) tips.push({icon:nm.icon, text:`パーソナルデイ【${num.day}】${nm.name}。${nm.tip}`, src:'数秘術'});

  tips.push({icon:moon.icon, text:`月は${moon.name}（月齢${moon.age.toFixed(1)}日）。${moon.energy}。`, src:'西洋占星術（月相）'});
  tips.push({icon:'☯️', text:`今日の日柱は【${pillar.pillar}】。${pillar.sElem}${pillar.polar}のエネルギー。${pillar.tip}`, src:'四柱推命（日柱）'});

  // Period tip
  if (period) {
    tips.push({icon: period.phaseIcon, text: `${period.phase}（周期${period.dayInCycle}日目）。${period.tip} 次の生理まであと${period.daysToNext}日。`, src:'生理周期'});
    if (period.dayInCycle <= period.periodDays && bio.emotional < -0.2)
      tips.push({icon:'💙', text:'生理期間×感情低調が重なってる。しんどくて当然です。体が一番えらい時期。予定を詰めず、休むことを選んで。', src:'複合分析（生理×バイオリズム）'});
    if (period.phase === '排卵期' && bio.emotional > 0.3)
      tips.push({icon:'🚀', text:'排卵期×感情高め！今週は発信・人に会う・セールスに動く最大チャンス。このエネルギー、使い切って。', src:'複合分析（生理×バイオリズム）'});
  }

  // Combined
  if (bio.emotional < -0.3 && moon.phase > 0.44 && moon.phase < 0.56)
    tips.push({icon:'🌕💙', text:'満月×感情低調期。感情の波が大きくなりやすい。感じることを否定せず、ただ観察する視点を持って。流れをせき止めないで。', src:'複合分析'});

  if (bio.emotional > 0.5 && [1,3,8].includes(num.day))
    tips.push({icon:'🚀', text:'感情エネルギー高×数秘が行動日！今日発信したことは響く。積み上げてきたものを出すチャンス。', src:'複合分析'});

  if (bio.physical < -0.4 && bio.emotional < -0.3)
    tips.push({icon:'🌱', text:'身体も感情も内向きの時期。落ち込んでいるのではなく、根を張っている時間。来るべき開花に備えて、静かに充電する日。', src:'複合分析'});

  return tips;
}

// ── Canvas chart ──────────────────────────────────────
function drawChart(canvas, birth, target) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 40;
  const H = 150;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Grid
  ctx.strokeStyle = '#1c1c3c';
  ctx.lineWidth = 1;
  for (let g = 0; g <= 4; g++) {
    const y = (g / 4) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Zero line
  ctx.strokeStyle = '#2a2a55';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

  // Today line
  ctx.strokeStyle = 'rgba(96,165,250,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(W/2, 4); ctx.lineTo(W/2, H-4); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(96,165,250,0.5)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('今日', W/2, H - 3);

  // Curves
  const DAYS = 28, pad = 18;
  const birthTs = birth.getTime(), targetTs = target.getTime();

  function curve(color, period) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= DAYS; i++) {
      const offset = (i - DAYS/2) * 864e5;
      const d = Math.floor((targetTs + offset - birthTs) / 864e5);
      const v = Math.sin(2 * Math.PI * d / period);
      const x = pad + (i / DAYS) * (W - 2*pad);
      const y = H/2 - v * (H/2 - 10);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  curve('#f87171', 23);
  curve('#c084fc', 28);
  curve('#60a5fa', 33);

  // Dots at today
  [[23,'#f87171'],[28,'#c084fc'],[33,'#60a5fa']].forEach(([per, col]) => {
    const d = Math.floor((targetTs - birthTs) / 864e5);
    const v = Math.sin(2 * Math.PI * d / per);
    const x = W/2, y = H/2 - v*(H/2-10);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, 2*Math.PI);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.strokeStyle = '#08081a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

// ── Render ────────────────────────────────────────────
function render() {
  const tVal = document.getElementById('targetDate').value;

    `${target.getFullYear()}年${target.getMonth()+1}月${target.getDate()}日（${DOW[target.getDay()]}）`;

  const bio    = bioRhythm(birth, target);
  const num    = personalDay(birth, target);
  const moon   = moonPhase(target);

  const periodDates = loadPeriods();
  const periodStartStr = getLastPeriod(periodDates);

  const period = periodStartStr ? menstrualPhase(periodStartStr, cycleLen, target) : null;

  // Overall

  document.getElementById('overallScore').textContent = ovr.score + '点';

  // Chart

  // Bio bars

    {label:'身体', val:bio.physical,     color:'#f87171'},

  document.getElementById('bioBars').innerHTML = bioList.map(b => {

      <span class="bio-label">${b.label}</span>

      </div>

      <span class="bio-badge ${bCls}">${bTxt}</span>
    </div>`;
  }).join('');

  // Cards
  const nm = numInfo[num.day] || {name:'−', icon:'?'};
  const periodCardHtml = period ? `
    <div class="card" style="border-color:${period.phaseColor}33">
      <div class="card-icon">${period.phaseIcon}</div>
      <div class="card-label">生理周期フェーズ</div>
      <div class="card-value" style="color:${period.phaseColor}">${period.phase}</div>
      <div class="card-sub">周期 ${period.dayInCycle} 日目 ／ ${period.cycleLength}日周期</div>
      <div class="card-sub" style="margin-top:4px">次の生理まで <strong style="color:${period.phaseColor}">${period.daysToNext}日</strong></div>
      <div class="phase-bar"><div class="phase-bar-fill" style="width:${period.phasePct}%;background:${period.phaseColor}"></div></div>
    </div>` : '';

  document.getElementById('cards').innerHTML = `
    ${periodCardHtml}
    <div class="card">
      <div class="card-icon">🔢</div>
      <div class="card-label">数秘術 パーソナルデイ</div>
      <div class="card-value">${nm.icon} ${num.day}</div>
      <div class="card-sub">${nm.name}</div>
      <div class="card-sub" style="margin-top:6px">年数 ${num.year} ／ 月数 ${num.month}</div>
    </div>
    <div class="card">
      <div class="card-icon">${moon.icon}</div>
      <div class="card-label">月相</div>
      <div class="card-value">${moon.name}</div>
      <div class="card-sub">${moon.energy}</div>
      <div class="card-sub" style="margin-top:6px">月齢 ${moon.age.toFixed(1)} 日</div>
    </div>
    <div class="card">
      <div class="card-icon">☯️</div>
      <div class="card-label">四柱推命 日柱</div>
      <div class="card-value">${pillar.pillar}</div>
      <div class="card-sub">${pillar.sElem}${pillar.polar} × ${pillar.bElem}</div>

    </div>
    <div class="card">

      <div class="card-sub" style="margin-top:6px">身 ${Math.round(bio.physical*100)}% 感 ${Math.round(bio.emotional*100)}% 知 ${Math.round(bio.intellectual*100)}%</div>

}

// ── Period log (localStorage) ─────────────────────────
const PERIOD_KEY = 'yaya_period_log';
const SEED_DATES = [
  // 2022
  '2022-11-27','2022-12-25',
  // 2023
  '2023-01-25','2023-02-24','2023-03-24','2023-04-21',
  '2023-05-21','2023-06-18','2023-07-17','2023-08-15',
  '2023-09-14','2023-10-13','2023-11-11','2023-12-10',
  // 2024
  '2024-01-07','2024-02-09','2024-03-10','2024-04-10',
  '2024-05-13','2024-06-10','2024-07-08','2024-08-06',
  '2024-09-04','2024-10-02','2024-10-31','2024-11-28','2024-12-28',
  // 2025
  '2025-01-25','2025-02-24','2025-03-23','2025-04-22',
  '2025-05-18','2025-06-17','2025-07-15','2025-08-12',
  '2025-09-08','2025-10-05','2025-11-03',
  '2025-12-04','2025-12-30',
  // 2026
  '2026-01-25','2026-02-25','2026-03-26',
  '2026-04-22','2026-05-20','2026-06-14'
];

function loadPeriods() {
  const s = localStorage.getItem(PERIOD_KEY);
  const stored = s ? JSON.parse(s) : [];
  // Merge stored + seed (union), always include full seed
  const merged = [...new Set([...SEED_DATES, ...stored])].sort();
  savePeriods(merged);
  return merged;
}
function savePeriods(dates) {
  localStorage.setItem(PERIOD_KEY, JSON.stringify(dates.sort()));
}
function calcAvgCycle(dates) {
  const sorted = [...dates].sort();
  if (sorted.length < 2) return 28;
  let total = 0;
  for (let i = 1; i < sorted.length; i++) {
    total += Math.floor((new Date(sorted[i]+'T12:00:00') - new Date(sorted[i-1]+'T12:00:00')) / 864e5);
  }
  return Math.round(total / (sorted.length - 1));
}
function getLastPeriod(dates) {
  return [...dates].sort().pop() || null;
}

function renderPeriodHistory() {
  const dates = loadPeriods().sort().reverse(); // newest first
  const avg = calcAvgCycle(dates);
  document.getElementById('periodAvgBadge').textContent = `平均 ${avg}日周期`;

  let html = '';
  for (let i = 0; i < dates.length; i++) {
    const d = dates[i];
    const prev = dates[i+1];
    let cycleHtml = '<span style="color:var(--border)">—</span>';
    if (prev) {
      const days = Math.floor((new Date(d+'T12:00:00') - new Date(prev+'T12:00:00')) / 864e5);
      const cls = days <= avg - 3 ? 'cycle-short' : days >= avg + 3 ? 'cycle-long' : '';
      const note = days <= avg - 3 ? ' ⬇短め' : days >= avg + 3 ? ' ⬆長め' : '';
      cycleHtml = `<span class="${cls}">${days}日周期${note}</span>`;
    }
    const dateObj = new Date(d+'T12:00:00');
    const label = `${dateObj.getFullYear()}/${dateObj.getMonth()+1}/${dateObj.getDate()}`;
    const moonOnStart = moonPhase(new Date(d + 'T12:00:00'));
    const moonAge = moonOnStart.age;
    // Classify: new moon ±3 days (age 0-3 or 27-29.5), full moon ±3 days (age 11-17)
    let moonLabel, moonCls;
    if (moonAge <= 3 || moonAge >= 26.5) {
      moonLabel = '🌑新月'; moonCls = 'moon-new';
    } else if (moonAge >= 11 && moonAge <= 17) {
      moonLabel = '🌕満月'; moonCls = 'moon-full';
    } else if (moonAge < 11) {
      moonLabel = '🌒上弦前'; moonCls = '';
    } else if (moonAge < 26.5) {
      moonLabel = '🌘下弦後'; moonCls = '';
    }

    html += `<div class="period-row">
      <span class="period-row-date">🔴 ${label}</span>
      <span class="period-row-cycle">${cycleHtml}</span>
      <span class="period-moon ${moonCls}">${moonLabel}</span>
      <button class="btn btn-del" onclick="deletePeriod('${d}')">削除</button>
    </div>`;
  }
  document.getElementById('periodHistory').innerHTML = html || '<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:8px">記録なし</div>';
  document.getElementById('periodAvgRow').innerHTML =
    `記録 ${dates.length}件 ／ 平均周期 <strong>${avg}日</strong> ／ 次の生理予測: <strong>${predictNext(dates, avg)}</strong>`;
}

function predictNext(dates, avg) {
  const last = getLastPeriod(dates);
  if (!last) return '—';
  const next = new Date(last+'T12:00:00');
  next.setDate(next.getDate() + avg);
  return `${next.getMonth()+1}/${next.getDate()}（あと${Math.round((next-new Date())/864e5)}日）`;
}

function addPeriodDate() {
  const val = document.getElementById('periodAddDate').value;
  if (!val) return;
  const dates = loadPeriods();
  if (!dates.includes(val)) { dates.push(val); savePeriods(dates); }
  renderPeriodHistory();
  render();
}
function addTodayPeriod() {
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const val = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const dates = loadPeriods();
  if (!dates.includes(val)) { dates.push(val); savePeriods(dates); }
  renderPeriodHistory();
  render();
}
function deletePeriod(dateStr) {
  const dates = loadPeriods().filter(d => d !== dateStr);
  savePeriods(dates);
  renderPeriodHistory();
  render();
}

// ── Menstrual phase ───────────────────────────────────
function menstrualPhase(periodStartStr, cycleLength, targetDate) {
  if (!periodStartStr) return null;
  const start = new Date(periodStartStr + 'T12:00:00');
  const periodDays = 8; // her pattern: ~2-3 spotting + 6 main flow
  const ovulationDay = Math.round(cycleLength / 2);

  // Find which cycle we're in
  let cycleStart = new Date(start);
  while (true) {
    const next = new Date(cycleStart);
    next.setDate(next.getDate() + cycleLength);
    if (next > targetDate) break;
    cycleStart = next;
  }

  const dayInCycle = Math.floor((targetDate - cycleStart) / 864e5) + 1;

  let phase, phaseIcon, phaseColor, tip, nextLabel;
  const nextPeriod = new Date(cycleStart);
  nextPeriod.setDate(nextPeriod.getDate() + cycleLength);
  const daysToNext = Math.round((nextPeriod - targetDate) / 864e5);

  if (dayInCycle <= periodDays) {
    phase = '月経期'; phaseIcon = '🔴'; phaseColor = '#f87171';
    tip = '体が内側に向いてる時期。無理しないで。直感とつながりやすい。';
  } else if (dayInCycle <= ovulationDay - 2) {
    phase = '卵胞期'; phaseIcon = '🌱'; phaseColor = '#34d399';
    tip = 'エネルギーが上昇中！新しいこと・行動・発信に向いてる。';
  } else if (dayInCycle <= ovulationDay + 2) {
    phase = '排卵期'; phaseIcon = '✨'; phaseColor = '#fbbf24';
    tip = 'コミュ力・発信力が最大値！人に会う・SNS投稿・セールスに最高の時期。';
  } else if (dayInCycle <= cycleLength - 7) {
    phase = '黄体期（前半）'; phaseIcon = '🌕'; phaseColor = '#c084fc';
    tip = '安定して内側が充実してる時期。深い仕事・創作に向いてる。';
  } else {
    phase = '黄体期（PMS期）'; phaseIcon = '🌘'; phaseColor = '#94a3b8';
    tip = '感情が揺れやすい時期。自分を責めないで。体からのサインを受け取って。';
  }

  const phasePct = Math.min(100, Math.round((dayInCycle / cycleLength) * 100));

  return { dayInCycle, cycleLength, phase, phaseIcon, phaseColor, tip, phasePct, daysToNext, nextPeriod, periodDays, cycleStart };
}

function isPeriodDay(periodStartStr, cycleLength, targetDate) {
  if (!periodStartStr) return false;
  const info = menstrualPhase(periodStartStr, cycleLength, targetDate);
  return info && info.dayInCycle <= info.periodDays;
}

// ── Week grid ─────────────────────────────────────────
function renderWeek(birth, today) {
  const DOW = ['日','月','火','水','木','金','土'];
  const pad = n => String(n).padStart(2,'0');
  const toStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const todayStr = toStr(today);

  const cols = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);

    const bio  = bioRhythm(birth, d);
    const num  = personalDay(birth, d);
    const moon = moonPhase(d);
    const ovr  = overallScore(bio, num, moon);
    const dStr = toStr(d);
    const isToday = (i === 0);
    const scoreColor = ovr.score >= 65 ? '#34d399' : ovr.score >= 45 ? '#60a5fa' : ovr.score >= 30 ? '#fbbf24' : '#f87171';

    const bars = [
      { val: bio.physical,     color: '#f87171' },
      { val: bio.emotional,    color: '#c084fc' },
      { val: bio.intellectual, color: '#60a5fa' },
    ].map(b => {
      const left  = b.val >= 0 ? 50 : (50 + b.val * 50);
      const width = Math.abs(b.val) * 50;
      return `<div class="wd-bar-row">
        <div class="wd-bar-track">
          <div class="wd-bar-fill" style="left:${left}%;width:${width}%;background:${b.color}"></div>
        </div>
      </div>`;
    }).join('');

    const pDates = loadPeriods();
    const isperiod = isPeriodDay(getLastPeriod(pDates), calcAvgCycle(pDates), d);

    cols.push(`
      <div class="week-day ${isToday ? 'today' : ''}" data-date="${dStr}" onclick="jumpToDate('${dStr}')">
        <div class="wd-dow">${DOW[d.getDay()]}</div>
        <div class="wd-date">${d.getDate()}日</div>
        <div class="wd-emoji">${ovr.emoji}</div>
        <div class="wd-score" style="color:${scoreColor}">${ovr.score}点</div>
        <div class="wd-bars">${bars}</div>
        ${isperiod ? '<div class="wd-period-dot"></div>' : ''}
      </div>`);
  }
  document.getElementById('weekGrid').innerHTML = cols.join('');
}

function jumpToDate(dateStr) {
  document.getElementById('targetDate').value = dateStr;
  document.querySelectorAll('.week-day').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.week-day[data-date="${dateStr}"]`);
  if (el) el.classList.add('selected');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──────────────────────────────────────────────
(function init() {
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  document.getElementById('targetDate').value  = todayStr;
  document.getElementById('birthDate').value   = '1981-07-29';
  document.getElementById('periodAddDate').value = todayStr;

  ['targetDate','birthDate'].forEach(id =>
    document.getElementById(id).addEventListener('change', render)
  );

  renderPeriodHistory();

  render();
  window.addEventListener('resize', () => {
    const tVal = document.getElementById('targetDate').value;
    const bVal = document.getElementById('birthDate').value;
    if (tVal && bVal) {
      const canvas = document.getElementById('bioCanvas');
      drawChart(canvas, new Date(bVal+'T12:00:00'), new Date(tVal+'T12:00:00'));
    }
  });
})();
