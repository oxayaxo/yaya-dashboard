<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自分状態ダッシュボード ✦</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #08081a;
  --surface: #0f0f28;
  --card: #13132e;
  --border: #252550;
  --accent: #60a5fa;
  --accent2: #c084fc;
  --accent3: #34d399;
  --text: #e2e8f0;
  --muted: #64748b;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  min-height: 100vh;
  padding: 28px 16px 60px;
}
.container { max-width: 760px; margin: 0 auto; }

/* Header */
.header { text-align: center; margin-bottom: 28px; }
.header-stars { font-size: 1rem; color: var(--accent); letter-spacing: 8px; margin-bottom: 8px; }
.header h1 { font-size: 1.35rem; font-weight: 700; color: #fff; letter-spacing: 0.15em; }
.header-date { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

/* Date picker */
.date-row {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 24px;
}
.date-row label { font-size: 0.8rem; color: var(--muted); }
input[type="date"] {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); padding: 7px 14px; border-radius: 10px;
  font-size: 0.95rem; cursor: pointer; outline: none;
}
input[type="date"]:focus { border-color: var(--accent); }

/* Overall */
.overall {
  background: linear-gradient(135deg, #13132e 0%, #1a1040 100%);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 28px; text-align: center;
  margin-bottom: 20px; position: relative; overflow: hidden;
}
.overall::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 60% 40%, rgba(96,165,250,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.overall-emoji { font-size: 3.5rem; margin-bottom: 4px; }
.overall-score { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.overall-label { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
.overall-desc { font-size: 0.95rem; color: var(--text); margin-top: 10px; }

/* Section title */
.section-title {
  font-size: 0.75rem; color: var(--accent); letter-spacing: 0.12em;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Chart */
.chart-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px; margin-bottom: 20px;
}
canvas { display: block; width: 100%; }
.chart-legend { display: flex; gap: 20px; margin-top: 10px; font-size: 0.78rem; }
.leg { display: flex; align-items: center; gap: 6px; color: var(--muted); }
.leg-line { width: 20px; height: 3px; border-radius: 2px; }

/* Bio bars */
.bio-bars { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
.bio-row { display: flex; align-items: center; gap: 10px; }
.bio-label { font-size: 0.78rem; color: var(--muted); width: 28px; flex-shrink: 0; }
.bio-track {
  flex: 1; height: 8px; background: var(--border);
  border-radius: 4px; position: relative;
}
.bio-center { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #2a2a5a; transform: translateX(-50%); }
.bio-fill { position: absolute; top: 0; height: 100%; border-radius: 4px; transition: all 0.6s cubic-bezier(.4,0,.2,1); }
.bio-pct { font-size: 0.78rem; width: 42px; text-align: right; flex-shrink: 0; }
.bio-badge {
  font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; flex-shrink: 0; width: 62px; text-align: center;
}
.badge-up   { background: rgba(52,211,153,.15); color: #34d399; border: 1px solid rgba(52,211,153,.3); }
.badge-down { background: rgba(239,68,68,.15);  color: #ef4444;  border: 1px solid rgba(239,68,68,.3); }
.badge-crit { background: rgba(251,191,36,.18); color: #fbbf24;  border: 1px solid rgba(251,191,36,.4); }

/* Cards */
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
@media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px;
}
.card-icon { font-size: 1.4rem; margin-bottom: 6px; }
.card-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 4px; }
.card-value { font-size: 1.45rem; font-weight: 700; }
.card-sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }

/* Tips */
.tips-wrap { background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px; }
.tip-headline { font-size:1.35rem;font-weight:700;line-height:1.3;margin-bottom:4px; }
.tip-subline  { font-size:0.8rem;color:var(--muted);margin-bottom:16px;line-height:1.6; }
.tip-chips    { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px; }
.tip-chip     { border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:2px; }
.tip-chip-label { font-size:0.65rem;font-weight:700;letter-spacing:.04em;opacity:.7;text-transform:uppercase; }
.tip-chip-val   { font-size:0.9rem;font-weight:700; }
.chip-green  { background:rgba(52,211,153,.13);color:#34d399; }
.chip-red    { background:rgba(239,68,68,.13);color:#ef4444; }
.chip-yellow { background:rgba(245,158,11,.13);color:#f59e0b; }
.chip-blue   { background:rgba(96,165,250,.13);color:#60a5fa; }
.chip-gray   { background:rgba(148,163,184,.1);color:var(--muted); }
.chip-purple { background:rgba(192,132,252,.13);color:#c084fc; }
.tip-actions { display:flex;flex-direction:column;gap:8px;margin-bottom:16px; }
.tip-do, .tip-dont { display:flex;flex-direction:column;gap:4px; }
.tip-action-label { font-size:0.7rem;font-weight:700;margin-bottom:2px;opacity:.7; }
.tip-action-item  { font-size:0.82rem;line-height:1.5;padding-left:4px; }
.tip-divider  { border:none;border-top:1px solid var(--border);margin:14px 0; }
.tip-toggle   { font-size:0.75rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none;padding:0; }
.tip-detail   { margin-top:12px;display:none; }
.tip-detail.open { display:block; }
.tip { display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border); }
.tip:first-child { padding-top:0; }
.tip:last-child  { border-bottom:none;padding-bottom:0; }
.tip-icon { font-size:1rem;flex-shrink:0;padding-top:2px; }
.tip-body { flex:1; }
.tip-text { font-size:0.82rem;line-height:1.6; }
.tip-src  { font-size:0.65rem;color:var(--muted);margin-top:2px; }

/* Birth input */
.birth-row { text-align: center; margin-top: 24px; }
.birth-row .birth-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }

/* Period phase card */
.period-card-inner { display: flex; flex-direction: column; gap: 4px; }
.phase-bar { height: 6px; border-radius: 3px; margin-top: 10px; background: var(--border); position: relative; overflow: hidden; }
.phase-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.period-marker { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-top: 6px; font-weight: 700; }

/* Week day period dot */
.wd-period-dot { width: 6px; height: 6px; border-radius: 50%; background: #f87171; margin: 2px auto 0; }

/* Settings / period log */
.settings-wrap {
  margin-top: 24px;
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  overflow: hidden;
}
.settings-top {
  display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
  gap: 16px; padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.s-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.s-label { font-size: 0.68rem; color: var(--muted); }
.settings-top input[type="date"] { padding: 6px 10px; font-size: 0.85rem; }

/* Period log */
.period-log { padding: 16px 20px; }
.period-log-title {
  font-size: 0.72rem; color: var(--accent); letter-spacing: 0.1em;
  margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
}
.period-add-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.period-add-row input[type="date"] { flex: 1; padding: 6px 10px; font-size: 0.85rem; }
.btn {
  background: var(--accent); color: #fff; border: none;
  padding: 7px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;
  white-space: nowrap; font-weight: 600; transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn-sm { padding: 4px 10px; font-size: 0.72rem; border-radius: 6px; }
.btn-today { background: var(--accent3); }
.btn-del { background: transparent; color: #f87171; border: 1px solid #f8717144; font-size: 0.7rem; padding: 3px 8px; }
.period-history { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
.period-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: 8px; padding: 8px 12px;
  font-size: 0.82rem;
}
.period-row-date { font-weight: 600; flex: 1; }
.period-row-cycle { color: var(--muted); font-size: 0.75rem; flex: 1; }
.cycle-short { color: #fbbf24; }
.cycle-long  { color: #60a5fa; }
.period-moon { font-size: 0.72rem; flex-shrink: 0; }
.moon-new  { color: #60a5fa; font-weight: 700; }
.moon-full { color: #fbbf24; font-weight: 700; }
.period-avg {
  text-align: center; padding: 10px;
  font-size: 0.78rem; color: var(--muted);
  border-top: 1px solid var(--border); margin-top: 10px;
}
.period-avg strong { color: var(--text); }

/* Week view */
.week-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px; margin-bottom: 20px;
}
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 12px; }
.week-day {
  display: flex; flex-direction: column; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 4px; cursor: pointer;
  transition: border-color 0.2s;
}
.week-day:hover { border-color: var(--accent); }
.week-day.today { border-color: var(--accent); background: rgba(96,165,250,0.08); }
.week-day.selected { border-color: var(--accent2); background: rgba(192,132,252,0.1); }
.wd-dow  { font-size: 0.68rem; color: var(--muted); }
.wd-date { font-size: 0.75rem; font-weight: 700; margin: 2px 0; }
.wd-emoji { font-size: 1.1rem; margin: 2px 0; }
.wd-score { font-size: 0.72rem; font-weight: 700; }
.wd-bars { width: 100%; margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
.wd-bar-row { display: flex; align-items: center; gap: 2px; }
.wd-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; position: relative; }
.wd-bar-fill  { position: absolute; top: 0; height: 100%; border-radius: 2px; }

/* ── Koyomi & Calendar ─────────────────────────────── */
.cal-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-title{font-size:1rem;font-weight:700}
.cal-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.9rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{text-align:center;font-size:0.65rem;color:var(--muted);padding:4px 0}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 3px;cursor:pointer;transition:border-color .15s;min-height:70px;display:flex;flex-direction:column;gap:1px}
.cal-cell:hover{border-color:var(--accent)}
.cal-empty{background:transparent!important;border-color:transparent!important;cursor:default!important;pointer-events:none}
.cal-today{border-color:var(--accent)!important;background:rgba(96,165,250,.1)!important}
.cal-day-num{font-size:0.72rem;font-weight:700}
.cal-rokuyo{font-size:0.52rem}
.cal-score{font-size:0.62rem;font-weight:600}
.cal-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:1px}
.cal-tag{font-size:0.48rem;padding:1px 4px;border-radius:3px;line-height:1.5}
.cat-super{background:rgba(245,158,11,.14)!important;border-color:#f59e0b66!important}
.cat-best{background:rgba(192,132,252,.12)!important;border-color:#c084fc66!important}
.cat-good{background:rgba(52,211,153,.09)!important;border-color:#34d39966!important}
.cat-caution{opacity:.65}
.cat-ng{background:rgba(239,68,68,.12)!important;border-color:#ef444466!important}
.cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:0.68rem;color:var(--muted)}
.leg2{display:flex;align-items:center;gap:4px}
.leg2-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.bestdays-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:20px}
.bestday-section{margin-bottom:10px}
.bestday-label{font-size:0.72rem;color:var(--muted);margin-bottom:8px}
.bestday-chips{display:flex;flex-wrap:wrap;gap:8px}
.bestday-chip{border:1px solid;border-radius:8px;padding:6px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.bestday-chip:hover{opacity:.8}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-stars">✦ ✦ ✦</div>
    <h1>自分状態ダッシュボード</h1>
    <div class="header-date" id="headerDate"></div>
  </div>

  <div class="date-row">
    <label>チェックする日</label>
    <input type="date" id="targetDate">
  </div>

  <!-- Overall -->
  <div class="overall">
    <div class="overall-emoji" id="overallEmoji"></div>
    <div class="overall-score" id="overallScore"></div>
    <div class="overall-label">総合エネルギースコア</div>
    <div class="overall-desc" id="overallDesc"></div>
  </div>

  <!-- Biorhythm -->
  <div class="chart-wrap">
    <div class="section-title">📈 バイオリズム（前後14日）</div>
    <canvas id="bioCanvas" height="150"></canvas>
    <div class="chart-legend">
      <div class="leg"><div class="leg-line" style="background:#f87171"></div>身体 (23日)</div>
      <div class="leg"><div class="leg-line" style="background:#c084fc"></div>感情 (28日)</div>
      <div class="leg"><div class="leg-line" style="background:#60a5fa"></div>知性 (33日)</div>
    </div>
    <div class="bio-bars" id="bioBars"></div>
  </div>

  <!-- Cards -->
  <div class="section-title" style="margin-bottom:14px">✦ 各軸の詳細</div>
  <div class="cards" id="cards"></div>

  <!-- Tips -->
  <div class="section-title" style="margin-bottom:14px">💫 今日のTips</div>
  <div class="tips-wrap">
    <div id="tips"></div>
  </div>

  <!-- Week view -->
  <div class="section-title" style="margin-bottom:14px">📅 直近7日間の推移</div>
  <div class="week-wrap">
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- Best days -->
  <div class="section-title" style="margin-bottom:14px">🔥 今月のベスト日</div>
  <div class="bestdays-wrap" id="bestdays"></div>

  <!-- Monthly calendar -->
  <div class="section-title" style="margin-bottom:14px">📅 月間カレンダー（開運×体の波）</div>
  <div class="cal-wrap">
    <div class="cal-nav">
      <button onclick="prevMonth()">←</button>
      <span class="cal-nav-title" id="calTitle"></span>
      <button onclick="nextMonth()">→</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-legend">
      <div class="leg2"><div class="leg2-dot" style="background:#f59e0b"></div>🔥超ベスト</div>
      <div class="leg2"><div class="leg2-dot" style="background:#c084fc"></div>✨ベスト</div>
      <div class="leg2"><div class="leg2-dot" style="background:#34d399"></div>👍良好</div>
      <div class="leg2"><div class="leg2-dot" style="background:#ef4444"></div>🚫不成就日NG</div>
    </div>
  </div>

  <!-- Settings + Period log -->
  <div class="settings-wrap">
    <div class="settings-top">
      <div class="s-item">
        <span class="s-label">生年月日</span>
        <input type="date" id="birthDate">
      </div>
    </div>
    <div class="period-log">
      <div class="period-log-title">
        <span>🔴 生理記録</span>
        <span id="periodAvgBadge" style="color:var(--text)"></span>
      </div>
      <div class="period-add-row">
        <input type="date" id="periodAddDate">
        <button class="btn btn-today" onclick="addTodayPeriod()">今日を追加</button>
        <button class="btn btn-sm" onclick="addPeriodDate()">追加</button>
      </div>
      <div class="period-history" id="periodHistory"></div>
      <div class="period-avg" id="periodAvgRow"></div>
    </div>
  </div>

</div>
<script>
// ── Biorhythm ──────────────────────────────────────────
function bioRhythm(birth, target) {
  const ms = 864e5;
  const d = Math.floor((target - birth) / ms);
  return {
    physical:     Math.sin(2 * Math.PI * d / 23),
    emotional:    Math.sin(2 * Math.PI * d / 28),
    intellectual: Math.sin(2 * Math.PI * d / 33),
    days: d
  };
}

// ── Numerology ──────────────────────────────────────────
function reduce(n) {
  while (n > 9 && n !== 11 && n !== 22 && n !== 33)
    n = String(n).split('').reduce((a,b) => a + +b, 0);
  return n;
}
function personalDay(birth, target) {
  const b = new Date(birth), t = new Date(target);
  const bm = b.getMonth()+1, bd = b.getDate();
  const ty = t.getFullYear(), tm = t.getMonth()+1, td = t.getDate();
  const py = reduce([...String(bm+bd+ty)].reduce((a,b)=>a+ +b,0));
  const pm = reduce(py + tm);
  const pd = reduce(pm + td);
  return { year: py, month: pm, day: pd };
}
const numInfo = {
  1:  { name:'独立・新始動',   icon:'⚡', tip:'自分の意志で動く日。新しい一歩を踏み出すのに最高のエネルギー。' },
  2:  { name:'協調・受容',     icon:'🤝', tip:'人との繋がりを大切に。直感と感受性が冴えわたる日。' },
  3:  { name:'表現・創造',     icon:'✨', tip:'発信・創作に最適。感じてることを言葉や行動で外に出して。' },
  4:  { name:'基盤・整理',     icon:'🏗️', tip:'コツコツ積み上げる日。環境整備・計画立案に向いてる。' },
  5:  { name:'変化・自由',     icon:'🌊', tip:'変化を楽しむ日。予定が変わっても大丈夫。流れに乗って。' },
  6:  { name:'愛・奉仕',       icon:'💛', tip:'大切な人と過ごす日。美しいものに触れて心を満たして。' },
  7:  { name:'内省・探究',     icon:'🔍', tip:'一人の時間を大切に。深く考えることに集中するのが吉。' },
  8:  { name:'豊かさ・力',     icon:'💎', tip:'ビジネス・お金の判断に向いてる日。行動が成果に直結しやすい。' },
  9:  { name:'完結・解放',     icon:'🌅', tip:'手放しと感謝の日。人のために動くと循環が生まれる。' },
  11: { name:'マスター・直感', icon:'🌟', tip:'特別な直感の日。スピリチュアルな感受性が最大化している。' },
  22: { name:'マスター・実現', icon:'🏛️', tip:'大きなビジョンを現実に落とす日。夢を動かすエネルギーがある。' },
  33: { name:'マスター・愛',   icon:'💫', tip:'愛と奉仕の最高エネルギー。人を癒し導く力が最大に。' },
};

// ── Moon phase ─────────────────────────────────────────
function moonPhase(target) {
  const knownNew = new Date('2000-01-06T18:14:00Z').getTime();
  const period = 29.53058867 * 864e5;
  const raw = ((target.getTime() - knownNew) % period + period) % period;
  const phase = raw / period;
  const age = phase * 29.53;

  let name, icon, energy;
  if      (phase < 0.03 || phase > 0.97) { name='新月';           icon='🌑'; energy='リセット・新しい意図を設定する時'; }
  else if (phase < 0.22)                  { name='三日月';         icon='🌒'; energy='種まき・計画を育てる時期'; }
  else if (phase < 0.28)                  { name='上弦の月';       icon='🌓'; energy='行動・決断・前進するエネルギー'; }
  else if (phase < 0.47)                  { name='十三夜';         icon='🌔'; energy='拡大・積み上げ・勢いに乗る時'; }
  else if (phase < 0.53)                  { name='満月';           icon='🌕'; energy='解放・感情が高まる・収穫の時'; }
  else if (phase < 0.72)                  { name='十六夜';         icon='🌖'; energy='感謝・手放し・整理のタイミング'; }
  else if (phase < 0.78)                  { name='下弦の月';       icon='🌗'; energy='振り返り・学び・内省の時期'; }
  else                                    { name='二十六夜（暗月）';icon='🌘'; energy='休息・内側へ・充電する時'; }
  return { phase, age, name, icon, energy };
}

// ── Day pillar (四柱推命 日柱) ────────────────────────
function dayPillar(date) {
  const stems   = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const branches= ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const sElem   = ['木','木','火','火','土','土','金','金','水','水'];
  const bElem   = ['水','土','木','木','土','火','火','土','金','金','土','水'];
  const sPolar  = ['+','-','+','-','+','-','+','-','+','-'];
  // Reference: 1900-01-01 = 甲戌 → ganzhi index 10
  const ref = new Date(1900, 0, 1, 12);
  const days = Math.floor((date.getTime() - ref.getTime()) / 864e5);
  const i60 = ((days + 10) % 60 + 60) % 60;
  const si = i60 % 10, bi = i60 % 12;
  const stemTips = {
    '甲':'新しい成長・リーダーシップが宿る日',
    '乙':'柔軟に・繊細な感性で受け取る日',
    '丙':'情熱と明るさを発揮する日',
    '丁':'内なる炎・直感を信じる日',
    '戊':'安定と信頼を積み重ねる日',
    '己':'地に足をつけ・実を取る日',
    '庚':'変容と決断・手放しの日',
    '辛':'洗練と内省・磨かれる日',
    '壬':'流れに乗り・知恵を活かす日',
    '癸':'完結と浄化・次へ向かう日',
  };
  return {
    pillar: stems[si]+branches[bi],
    stem: stems[si], branch: branches[bi],
    sElem: sElem[si], bElem: bElem[bi],
    polar: sPolar[si],
    tip: stemTips[stems[si]]
  };
}

// ── Overall score ──────────────────────────────────────
function overallScore(bio, num, moon) {
  let s = 50;
  s += bio.physical     * 15;
  s += bio.emotional    * 20;
  s += bio.intellectual * 10;
  if (moon.phase < 0.03 || moon.phase > 0.97) s += 6;
  if (moon.phase > 0.45 && moon.phase < 0.55) s -= 4;
  if ([11,22,33].includes(num.day)) s += 10;
  else if ([1,3,8].includes(num.day)) s += 5;
  s = Math.round(Math.min(96, Math.max(8, s)));
  let emoji, desc;
  if (s >= 75) { emoji='🌟'; desc='エネルギー全開！積極的に動いていい日'; }
  else if (s >= 55) { emoji='😊'; desc='安定している。じっくり丁寧に進める日'; }
  else if (s >= 35) { emoji='🌱'; desc='充電期。自分を整えることを最優先に'; }
  else              { emoji='🌙'; desc='深い内省の時。休むことが最大の戦略'; }
  return { score: s, emoji, desc };
}

// ── Canvas chart ──────────────────────────────────────
function drawChart(canvas, birth, target) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 40;
  const H = 150;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Grid
  ctx.strokeStyle = '#1c1c3c';
  ctx.lineWidth = 1;
  for (let g = 0; g <= 4; g++) {
    const y = (g / 4) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Zero line
  ctx.strokeStyle = '#2a2a55';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

  // Today line
  ctx.strokeStyle = 'rgba(96,165,250,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(W/2, 4); ctx.lineTo(W/2, H-4); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(96,165,250,0.5)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('今日', W/2, H - 3);

  // Curves
  const DAYS = 28, pad = 18;
  const birthTs = birth.getTime(), targetTs = target.getTime();

  function curve(color, period) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= DAYS; i++) {
      const offset = (i - DAYS/2) * 864e5;
      const d = Math.floor((targetTs + offset - birthTs) / 864e5);
      const v = Math.sin(2 * Math.PI * d / period);
      const x = pad + (i / DAYS) * (W - 2*pad);
      const y = H/2 - v * (H/2 - 10);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  curve('#f87171', 23);
  curve('#c084fc', 28);
  curve('#60a5fa', 33);

  // Dots at today
  [[23,'#f87171'],[28,'#c084fc'],[33,'#60a5fa']].forEach(([per, col]) => {
    const d = Math.floor((targetTs - birthTs) / 864e5);
    const v = Math.sin(2 * Math.PI * d / per);
    const x = W/2, y = H/2 - v*(H/2-10);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, 2*Math.PI);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.strokeStyle = '#08081a';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

// ── Koyomi (暦注) ─────────────────────────────────────
function getDayBranch(date) {
  const ref = new Date(1900,0,1,12);
  const days = Math.floor((date.getTime()-ref.getTime())/864e5);
  return ((days+10)%60+60)%60%12;
}
function getDayGanzhi(date) {
  const ref = new Date(1900,0,1,12);
  const days = Math.floor((date.getTime()-ref.getTime())/864e5);
  return ((days+10)%60+60)%60;
}
// 不成就日: 月 → 日支ペア
function isFujouju(date) {
  const m=date.getMonth()+1, b=getDayBranch(date);
  const M={1:[0,6],2:[1,7],3:[2,8],4:[3,9],5:[4,10],6:[5,11],
           7:[0,6],8:[1,7],9:[2,8],10:[3,9],11:[4,10],12:[5,11]};
  return M[m].includes(b);
}
// 一粒万倍日: 節月 → 日支ペア
function isIchiryuManbai(date) {
  const m=date.getMonth()+1, d=date.getDate(), b=getDayBranch(date);
  let sm;
  if(m===1)sm=d<6?12:1; else if(m===2)sm=d<4?1:2;
  else if(m===3)sm=d<6?2:3; else if(m===4)sm=d<5?3:4;
  else if(m===5)sm=d<6?4:5; else if(m===6)sm=d<6?5:6;
  else if(m===7)sm=d<7?6:7; else if(m===8)sm=d<8?7:8;
  else if(m===9)sm=d<8?8:9; else if(m===10)sm=d<8?9:10;
  else if(m===11)sm=d<7?10:11; else sm=d<7?11:12;
  const M={1:[5,11],2:[0,6],3:[0,6],4:[1,7],5:[1,7],6:[2,8],
           7:[2,8],8:[3,9],9:[3,9],10:[4,10],11:[4,10],12:[5,11]};
  return M[sm].includes(b);
}
// 天赦日: 季節×干支 (春=戊寅14, 夏=甲午30, 秋=戊申44, 冬=甲子0)
function isTenshaDay(date) {
  const gz=getDayGanzhi(date), m=date.getMonth()+1, d=date.getDate();
  let t;
  if((m===2&&d>=4)||(m>2&&m<5)||(m===5&&d<6)) t=14;
  else if((m===5&&d>=6)||(m>5&&m<8)||(m===8&&d<8)) t=30;
  else if((m===8&&d>=8)||(m>8&&m<11)||(m===11&&d<7)) t=44;
  else t=0;
  return gz===t;
}
function isToraNoHi(date){ return getDayBranch(date)===2; }
function isMiNoHi(date)  { return getDayBranch(date)===5; }
// 三隣亡: 1・4・7・10月=亥(11), 2・5・8・11月=寅(2), 3・6・9・12月=午(6)
function isSanrinbou(date) {
  const m=date.getMonth()+1, b=getDayBranch(date);
  return {1:11,2:2,3:6,4:11,5:2,6:6,7:11,8:2,9:6,10:11,11:2,12:6}[m]===b;
}
// 六曜: (旧暦月+旧暦日) mod 6 → 先勝友引先負仏滅大安赤口
function getRokuyo(date) {
  const SYN=29.53058867, MS=864e5;
  const NM=new Date('2000-01-06T18:14:00Z').getTime();
  const el=(date.getTime()-NM)/(SYN*MS);
  const lunarDay=Math.floor((((el%1)+1)%1)*SYN)+1;
  const CNY=new Date('2023-01-22T01:53:00Z').getTime();
  const mf=(date.getTime()-CNY)/(SYN*MS);
  const lm=((Math.floor(mf)%12)+12)%12+1;
  const idx=(lm+lunarDay)%6;
  const N=['先勝','友引','先負','仏滅','大安','赤口'];
  return {name:N[idx],idx,isGood:idx===4||idx===1,isBad:idx===3||idx===5};
}
function calcKoyomi(date) {
  return {
    fujouju:      isFujouju(date),
    ichiryuManbai:isIchiryuManbai(date),
    tenshaDay:    isTenshaDay(date),
    toraNoHi:    isToraNoHi(date),
    miNoHi:      isMiNoHi(date),
    sanrinbou:   isSanrinbou(date),
    rokuyo:      getRokuyo(date),
  };
}

function sunEclipticLon(date) {
  const JD = date.getTime()/86400000+2440587.5;
  const n  = JD-2451545.0;
  const L  = (280.460+0.9856474*n)%360;
  const g  = ((357.528+0.9856003*n)%360)*Math.PI/180;
  return (((L+1.915*Math.sin(g)+0.020*Math.sin(2*g))%360)+360)%360;
}
function moonEclipticLon(date) {
  const JD = date.getTime()/86400000+2440587.5;
  const T  = (JD-2451545.0)/36525;
  const r  = x=>((x%360+360)%360)*Math.PI/180;
  const Lm = 218.3164477+481267.88123421*T;
  const D  = 297.8501921+445267.1114034*T;
  const Ms = 357.5291092+35999.0502909*T;
  const Mm = 134.9633964+477198.8675055*T;
  const F  = 93.2720950 +483202.0175233*T;
  return (((Lm+6.2888*Math.sin(r(Mm))+1.2740*Math.sin(r(2*D-Mm))+0.6583*Math.sin(r(2*D))+0.2136*Math.sin(r(2*Mm))-0.1851*Math.sin(r(Ms))-0.1143*Math.sin(r(2*F))-0.0588*Math.sin(r(2*D-2*Mm)))%360)+360)%360;
}

  const sIdx = Math.floor(((sLon%360)+360)%360), mIdx = Math.floor(((mLon%360)+360)%360);
  return {
    sun:  {sign:ZOD_JP[Math.floor(sIdx/30)], deg:(sIdx%30)+1, en:SABIAN[sIdx], jp:SABIAN_JP[sIdx], msg:SABIAN_MSG[sIdx]},
    moon: {sign:ZOD_JP[Math.floor(mIdx/30)], deg:(mIdx%30)+1, en:SABIAN[mIdx], jp:SABIAN_JP[mIdx], msg:SABIAN_MSG[mIdx]},
  };
}

const KYUSEI_NAMES = ['','一白水星','二黒土星','三碧木星','四緑木星','五黄土星',
                      '六白金星','七赤金星','八白土星','九紫火星'];
const KYUSEI_ICONS = ['','💧','🌍','⚡','🌿','🌀','🌟','✨','🏔','🔥'];

// 年の中心星（節分=2/4基準）
function kyuseiYearStar(date) {
  let y = date.getFullYear();
  const m = date.getMonth()+1, d = date.getDate();
  if(m===1||(m===2&&d<4)) y--;
  const n = ((1-(y-2026)%9+900)%9);
  return n===0?9:n;
}

// 節月インデックス (0=寅月 〜 11=丑月)
function getSetsuIdx(date) {
  const m=date.getMonth()+1, d=date.getDate();
  if((m===2&&d>=4)||(m===3&&d<6))  return 0;
  if((m===3&&d>=6)||(m===4&&d<5))  return 1;
  if((m===4&&d>=5)||(m===5&&d<6))  return 2;
  if((m===5&&d>=6)||(m===6&&d<6))  return 3;
  if((m===6&&d>=6)||(m===7&&d<7))  return 4;
  if((m===7&&d>=7)||(m===8&&d<8))  return 5;
  if((m===8&&d>=8)||(m===9&&d<8))  return 6;
  if((m===9&&d>=8)||(m===10&&d<8)) return 7;
  if((m===10&&d>=8)||(m===11&&d<7))return 8;
  if((m===11&&d>=7)||(m===12&&d<7))return 9;
  if((m===12&&d>=7)||(m===1&&d<6)) return 10;
  return 11; // 丑月
}

// 月の中心星（寅月=start, 以降毎月-1）
function kyuseiMonthStar(date) {
  const yc = kyuseiYearStar(date);
  const start = [8,5,2,8,5,2,8,5,2][yc-1];
  const idx = getSetsuIdx(date);
  const n = ((start-idx+900)%9);
  return n===0?9:n;
}

// 節月の開始日 [month-1, day]（0=Jan）
const SETSU_STARTS = [[1,4],[2,6],[3,5],[4,6],[5,6],[6,7],[7,8],[8,8],[9,8],[10,7],[11,7],[0,6]];

// 日の中心星
function kyuseiDayStar(date) {
  const mc = kyuseiMonthStar(date);
  const idx = getSetsuIdx(date);
  const [sm, sd] = SETSU_STARTS[idx];
  const startDate = new Date(date.getFullYear(), sm, sd, 12);
  const daysSince = Math.max(0, Math.floor((date.getTime()-startDate.getTime())/864e5));
  const n = ((mc-daysSince%9+900)%9);
  return n===0?9:n;
}

// 宮の位置: palace(N, centerStar)
function palaceOf(star, center) {
  return ((star+4-center+900)%9)+1;
}

function calcKyusei(date) {
  const yc = kyuseiYearStar(date);
  const mc = kyuseiMonthStar(date);
  const dc = kyuseiDayStar(date);
  const yp = palaceOf(HONMEISEI, yc);
  const mp = palaceOf(HONMEISEI, mc);
  const dp = palaceOf(HONMEISEI, dc);
  return { yc, mc, dc, yp, mp, dp,
    dayBonus: PALACE_SCORE[dp] };
}

    if(ko.ichiryuManbai){ score+=15; tags.push({label:'🌱一粒万倍', sc:'gold'}); }
    if(ko.toraNoHi)     { score+=8;  tags.push({label:'🐯寅の日', sc:'green'}); }
    if(ko.miNoHi)       { score+=8;  tags.push({label:'🐍巳の日', sc:'green'}); }
    if(ko.rokuyo.name==='大安')  { score+=10; tags.push({label:'大安', sc:'blue'}); }
    else if(ko.rokuyo.name==='友引') score+=5;
    else if(ko.rokuyo.name==='仏滅') { score-=20; warns.push('仏滅'); }
    else if(ko.rokuyo.name==='赤口') { score-=10; warns.push('赤口'); }
    if(ko.sanrinbou) { score-=15; warns.push('三隣亡'); }
    // バイオリズム
    score+=bio.emotional*20;
    score+=bio.physical*10;
    score+=bio.intellectual*8;
    // 生理フェーズ
    if(pd) {
      if(pd.phase==='排卵期')             score+=20;
      else if(pd.phase==='卵胞期')         score+=10;
      else if(pd.phase==='黄体期（前半）') score+=5;
      else if(pd.phase==='月経期')         score-=15;
      else if(pd.phase==='黄体期（PMS期）')score-=10;
    }
    // 数秘
    if([11,22,33].includes(num.day)) score+=12;
    else if([1,3,8].includes(num.day)) score+=7;
    // 月相
    if(moon.phase<0.1||moon.phase>0.93) score+=8;
    // 九星気学 日盤
    score += Math.round(ky.dayBonus * 0.4);
  }

  score=Math.round(Math.max(isNG?1:8, Math.min(100,score)));

  let cat, emoji, color;
  if(isNG)          { cat='ng';      emoji='🚫'; color='#ef4444'; }
  else if(score>=80){ cat='super';   emoji='🔥'; color='#f59e0b'; }
  else if(score>=65){ cat='best';    emoji='✨'; color='#c084fc'; }
  else if(score>=50){ cat='good';    emoji='👍'; color='#34d399'; }
  else if(score>=35){ cat='normal';  emoji='😐'; color='#60a5fa'; }
  else              { cat='caution'; emoji='⚠️'; color='#94a3b8'; }

  const acts=[];
  if(!isNG&&score>=60) {
    if(pd&&pd.phase==='排卵期'&&bio.emotional>0.1) acts.push('💬セールス');
    if(ko.ichiryuManbai||ko.tenshaDay) acts.push('🚀新規スタート');
    if(bio.emotional>0.35) acts.push('📣発信');
    if(bio.intellectual>0.35) acts.push('✍️創作');
    if(ko.toraNoHi||ko.miNoHi) acts.push('💰お金の話');
  }

  return {score, cat, emoji, color, tags, warns, isNG, acts, ko, pd};
}

// ── 月間カレンダー ─────────────────────────────────────
function renderCalendar(year, month) {
  calYear=year; calMonth=month;
  document.getElementById('calTitle').textContent=`${year}年${month}月`;

  const birth=new Date(document.getElementById('birthDate').value+'T12:00:00');
  const pDates=loadPeriods();
  const today=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const todayStr=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  const DOW=['日','月','火','水','木','金','土'];
  let html=DOW.map((d,i)=>
    `<div class="cal-hdr" style="${i===0?'color:#f87171':i===6?'color:#60a5fa':''}">${d}</div>`
  ).join('');

  const first=new Date(year,month-1,1);
  for(let i=0;i<first.getDay();i++) html+='<div class="cal-cell cal-empty"></div>';

  const last=new Date(year,month,0).getDate();
  for(let d=1;d<=last;d++) {
    const date=new Date(year,month-1,d,12);
    const ds=calcDayScore(date, birth, pDates);
    const dStr=`${year}-${pad(month)}-${pad(d)}`;
    const isToday=dStr===todayStr;
    const rkColor=ds.ko.rokuyo.isGood?'color:#f59e0b':ds.ko.rokuyo.isBad?'color:#ef4444':'color:var(--muted)';
    const tagsHtml=ds.tags.slice(0,2).map(t=>
      `<span class="cal-tag" style="${tagStyle(t.sc)}">${t.label}</span>`
    ).join('');
    html+=`<div class="cal-cell cat-${ds.cat}${isToday?' cal-today':''}" onclick="jumpToDate('${dStr}')">
      <div class="cal-day-num">${ds.emoji}${d}</div>
      <div class="cal-rokuyo" style="${rkColor}">${ds.ko.rokuyo.name}</div>
      <div class="cal-score" style="color:${ds.color}">${ds.isNG?'NG':ds.score+'点'}</div>
      <div class="cal-tags">${tagsHtml}</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderBestDays(year, month, birth, pDates);
}

function renderBestDays(year, month, birth, pDates) {
  const last=new Date(year,month,0).getDate();
  const pad=n=>String(n).padStart(2,'0');
  const all=[];
  for(let d=1;d<=last;d++) {
    const date=new Date(year,month-1,d,12);
    all.push({d, ds:calcDayScore(date,birth,pDates)});
  }
  const top=all.filter(x=>!x.ds.isNG).sort((a,b)=>b.ds.score-a.ds.score).slice(0,5);
  const special=all.filter(x=>!x.ds.isNG&&(x.ds.ko.tenshaDay||x.ds.ko.ichiryuManbai));
  const ngDays=all.filter(x=>x.ds.isNG);

  const chip=(x,col,label)=>
    `<span class="bestday-chip" style="background:${col}22;border-color:${col}55;color:${col}"
      onclick="jumpToDate('${year}-${pad(month)}-${pad(x.d)}')">${label}</span>`;

  let html=`<div class="bestday-section">
    <div class="bestday-label">💬 セールス・発信に動くなら（スコア高い順）</div>
    <div class="bestday-chips">${top.map(x=>chip(x,x.ds.color,`${month}/${x.d} ${x.ds.emoji}${x.ds.score}点`)).join('')}</div>
  </div>`;

  if(special.length) {
    html+=`<div class="bestday-section">
      <div class="bestday-label">🌟 開運日（天赦日・一粒万倍日）</div>
      <div class="bestday-chips">${special.map(x=>{
        const ls=[];
        if(x.ds.ko.tenshaDay) ls.push('天赦日');
        if(x.ds.ko.ichiryuManbai) ls.push('一粒万倍');
        return chip(x,'#f59e0b',`${month}/${x.d} ${ls.join('+')}`);
      }).join('')}</div>
    </div>`;
  }

  if(ngDays.length) {
    html+=`<div class="bestday-section">
      <div class="bestday-label" style="color:#ef4444">🚫 不成就日（全吉日打ち消し・動かない日）</div>
      <div style="color:#ef4444;font-size:0.82rem;font-weight:600;letter-spacing:0.05em">
        ${ngDays.map(x=>`${month}/${x.d}`).join('　')}
      </div>
    </div>`;
  }

  document.getElementById('bestdays').innerHTML=html;
}

function prevMonth() {
  if(calMonth===1){calYear--;calMonth=12;}else calMonth--;
  renderCalendar(calYear,calMonth);
}
function nextMonth() {
  if(calMonth===12){calYear++;calMonth=1;}else calMonth++;
  renderCalendar(calYear,calMonth);
}

// ── Period log (localStorage) ─────────────────────────
const PERIOD_KEY = 'yaya_period_log';
const SEED_DATES = [
  // 2022
  '2022-11-27','2022-12-25',
  // 2023
  '2023-01-25','2023-02-24','2023-03-24','2023-04-21',
  '2023-05-21','2023-06-18','2023-07-17','2023-08-15',
  '2023-09-14','2023-10-13','2023-11-11','2023-12-10',
  // 2024
  '2024-01-07','2024-02-09','2024-03-10','2024-04-10',
  '2024-05-13','2024-06-10','2024-07-08','2024-08-06',
  '2024-09-04','2024-10-02','2024-10-31','2024-11-28','2024-12-28',
  // 2025
  '2025-01-25','2025-02-24','2025-03-23','2025-04-22',
  '2025-05-18','2025-06-17','2025-07-15','2025-08-12',
  '2025-09-08','2025-10-05','2025-11-03',
  '2025-12-04','2025-12-30',
  // 2026
  '2026-01-25','2026-02-25','2026-03-26',
  '2026-04-22','2026-05-20','2026-06-14'
];

function loadPeriods() {
  const s = localStorage.getItem(PERIOD_KEY);
  const stored = s ? JSON.parse(s) : [];
  // Merge stored + seed (union), always include full seed
  const merged = [...new Set([...SEED_DATES, ...stored])].sort();
  savePeriods(merged);
  return merged;
}
function savePeriods(dates) {
  localStorage.setItem(PERIOD_KEY, JSON.stringify(dates.sort()));
}
function calcAvgCycle(dates) {
  const sorted = [...dates].sort();
  if (sorted.length < 2) return 28;
  let total = 0;
  for (let i = 1; i < sorted.length; i++) {
    total += Math.floor((new Date(sorted[i]+'T12:00:00') - new Date(sorted[i-1]+'T12:00:00')) / 864e5);
  }
  return Math.round(total / (sorted.length - 1));
}
function getLastPeriod(dates) {
  return [...dates].sort().pop() || null;
}

function renderPeriodHistory() {
  const dates = loadPeriods().sort().reverse(); // newest first
  const avg = calcAvgCycle(dates);
  document.getElementById('periodAvgBadge').textContent = `平均 ${avg}日周期`;

  let html = '';
  for (let i = 0; i < dates.length; i++) {
    const d = dates[i];
    const prev = dates[i+1];
    let cycleHtml = '<span style="color:var(--border)">—</span>';
    if (prev) {
      const days = Math.floor((new Date(d+'T12:00:00') - new Date(prev+'T12:00:00')) / 864e5);
      const cls = days <= avg - 3 ? 'cycle-short' : days >= avg + 3 ? 'cycle-long' : '';
      const note = days <= avg - 3 ? ' ⬇短め' : days >= avg + 3 ? ' ⬆長め' : '';
      cycleHtml = `<span class="${cls}">${days}日周期${note}</span>`;
    }
    const dateObj = new Date(d+'T12:00:00');
    const label = `${dateObj.getFullYear()}/${dateObj.getMonth()+1}/${dateObj.getDate()}`;
    const moonOnStart = moonPhase(new Date(d + 'T12:00:00'));
    const moonAge = moonOnStart.age;
    // Classify: new moon ±3 days (age 0-3 or 27-29.5), full moon ±3 days (age 11-17)
    let moonLabel, moonCls;
    if (moonAge <= 3 || moonAge >= 26.5) {
      moonLabel = '🌑新月'; moonCls = 'moon-new';
    } else if (moonAge >= 11 && moonAge <= 17) {
      moonLabel = '🌕満月'; moonCls = 'moon-full';
    } else if (moonAge < 11) {
      moonLabel = '🌒上弦前'; moonCls = '';
    } else if (moonAge < 26.5) {
      moonLabel = '🌘下弦後'; moonCls = '';
    }

    html += `<div class="period-row">
      <span class="period-row-date">🔴 ${label}</span>
      <span class="period-row-cycle">${cycleHtml}</span>
      <span class="period-moon ${moonCls}">${moonLabel}</span>
      <button class="btn btn-del" onclick="deletePeriod('${d}')">削除</button>
    </div>`;
  }
  document.getElementById('periodHistory').innerHTML = html || '<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:8px">記録なし</div>';
  document.getElementById('periodAvgRow').innerHTML =
    `記録 ${dates.length}件 ／ 平均周期 <strong>${avg}日</strong> ／ 次の生理予測: <strong>${predictNext(dates, avg)}</strong>`;
}

function predictNext(dates, avg) {
  const last = getLastPeriod(dates);
  if (!last) return '—';
  const next = new Date(last+'T12:00:00');
  next.setDate(next.getDate() + avg);
  return `${next.getMonth()+1}/${next.getDate()}（あと${Math.round((next-new Date())/864e5)}日）`;
}

function addPeriodDate() {
  const val = document.getElementById('periodAddDate').value;
  if (!val) return;
  const dates = loadPeriods();
  if (!dates.includes(val)) { dates.push(val); savePeriods(dates); }
  renderPeriodHistory();
  render();
}
function addTodayPeriod() {
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const val = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const dates = loadPeriods();
  if (!dates.includes(val)) { dates.push(val); savePeriods(dates); }
  renderPeriodHistory();
  render();
}
function deletePeriod(dateStr) {
  const dates = loadPeriods().filter(d => d !== dateStr);
  savePeriods(dates);
  renderPeriodHistory();
  render();
}

// ── Menstrual phase ───────────────────────────────────
function menstrualPhase(periodStartStr, cycleLength, targetDate) {
  if (!periodStartStr) return null;
  const start = new Date(periodStartStr + 'T12:00:00');
  const periodDays = 8; // her pattern: ~2-3 spotting + 6 main flow
  const ovulationDay = Math.round(cycleLength / 2);

  // Find which cycle we're in
  let cycleStart = new Date(start);
  while (true) {
    const next = new Date(cycleStart);
    next.setDate(next.getDate() + cycleLength);
    if (next > targetDate) break;
    cycleStart = next;
  }

  const dayInCycle = Math.floor((targetDate - cycleStart) / 864e5) + 1;

  let phase, phaseIcon, phaseColor, tip, nextLabel;
  const nextPeriod = new Date(cycleStart);
  nextPeriod.setDate(nextPeriod.getDate() + cycleLength);
  const daysToNext = Math.round((nextPeriod - targetDate) / 864e5);

  if (dayInCycle <= periodDays) {
    phase = '月経期'; phaseIcon = '🔴'; phaseColor = '#f87171';
    tip = '体が内側に向いてる時期。無理しないで。直感とつながりやすい。';
  } else if (dayInCycle <= ovulationDay - 2) {
    phase = '卵胞期'; phaseIcon = '🌱'; phaseColor = '#34d399';
    tip = 'エネルギーが上昇中！新しいこと・行動・発信に向いてる。';
  } else if (dayInCycle <= ovulationDay + 2) {
    phase = '排卵期'; phaseIcon = '✨'; phaseColor = '#fbbf24';
    tip = 'コミュ力・発信力が最大値！人に会う・SNS投稿・セールスに最高の時期。';
  } else if (dayInCycle <= cycleLength - 7) {
    phase = '黄体期（前半）'; phaseIcon = '🌕'; phaseColor = '#c084fc';
    tip = '安定して内側が充実してる時期。深い仕事・創作に向いてる。';
  } else {
    phase = '黄体期（PMS期）'; phaseIcon = '🌘'; phaseColor = '#94a3b8';
    tip = '感情が揺れやすい時期。自分を責めないで。体からのサインを受け取って。';
  }

  const phasePct = Math.min(100, Math.round((dayInCycle / cycleLength) * 100));

  return { dayInCycle, cycleLength, phase, phaseIcon, phaseColor, tip, phasePct, daysToNext, nextPeriod, periodDays, cycleStart };
}

function isPeriodDay(periodStartStr, cycleLength, targetDate) {
  if (!periodStartStr) return false;
  const info = menstrualPhase(periodStartStr, cycleLength, targetDate);
  return info && info.dayInCycle <= info.periodDays;
}

// ── Week grid ─────────────────────────────────────────
function renderWeek(birth, today) {
  const DOW = ['日','月','火','水','木','金','土'];
  const pad = n => String(n).padStart(2,'0');
  const toStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const todayStr = toStr(today);

  const cols = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);

    const bio  = bioRhythm(birth, d);
    const num  = personalDay(birth, d);
    const moon = moonPhase(d);
    const ovr  = overallScore(bio, num, moon);
    const dStr = toStr(d);
    const isToday = (i === 0);
    const scoreColor = ovr.score >= 65 ? '#34d399' : ovr.score >= 45 ? '#60a5fa' : ovr.score >= 30 ? '#fbbf24' : '#f87171';

    const bars = [
      { val: bio.physical,     color: '#f87171' },
      { val: bio.emotional,    color: '#c084fc' },
      { val: bio.intellectual, color: '#60a5fa' },
    ].map(b => {
      const left  = b.val >= 0 ? 50 : (50 + b.val * 50);
      const width = Math.abs(b.val) * 50;
      return `<div class="wd-bar-row">
        <div class="wd-bar-track">
          <div class="wd-bar-fill" style="left:${left}%;width:${width}%;background:${b.color}"></div>
        </div>
      </div>`;
    }).join('');

    const pDates = loadPeriods();
    const isperiod = isPeriodDay(getLastPeriod(pDates), calcAvgCycle(pDates), d);

    cols.push(`
      <div class="week-day ${isToday ? 'today' : ''}" data-date="${dStr}" onclick="jumpToDate('${dStr}')">
        <div class="wd-dow">${DOW[d.getDay()]}</div>
        <div class="wd-date">${d.getDate()}日</div>
        <div class="wd-emoji">${ovr.emoji}</div>
        <div class="wd-score" style="color:${scoreColor}">${ovr.score}点</div>
        <div class="wd-bars">${bars}</div>
        ${isperiod ? '<div class="wd-period-dot"></div>' : ''}
      </div>`);
  }
  document.getElementById('weekGrid').innerHTML = cols.join('');
}

function jumpToDate(dateStr) {
  document.getElementById('targetDate').value = dateStr;
  document.querySelectorAll('.week-day').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.week-day[data-date="${dateStr}"]`);
  if (el) el.classList.add('selected');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

(function init() {
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  document.getElementById('targetDate').value  = todayStr;
  document.getElementById('birthDate').value   = '1981-07-29';

  ['targetDate','birthDate'].forEach(id =>

  );

  renderPeriodHistory();

  const t = new Date();

  calMonth = t.getMonth() + 1;

  render();
  renderCalendar(calYear, calMonth);

      const canvas = document.getElementById('bioCanvas');
      drawChart(canvas, new Date(bVal+'T12:00:00'), new Date(tVal+'T12:00:00'));
    }
  });
})();
